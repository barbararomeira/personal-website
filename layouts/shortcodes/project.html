<div class="project-card">
  <div class="project-header">
    <h2 class="project-name">{{ .Get "name" }}</h2>
    {{ with .Get "tagline" }}<p class="project-tagline">{{ . | safeHTML }}</p>{{ end }}
  </div>

  <div class="project-flow" aria-label="{{ .Get "name" }} flow">
    {{ .Inner }}
  </div>

  {{ with .Get "tech" }}
  <div class="project-tech">
    {{ range (split . ",") }}<span class="project-tag">{{ trim . " " }}</span>{{ end }}
  </div>
  {{ end }}

  {{ with .Get "github" }}<a class="project-link" href="{{ . }}" target="_blank" rel="noopener">View on GitHub →</a>{{ end }}
</div>
