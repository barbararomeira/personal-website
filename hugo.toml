baseURL = "https://barbararomeira.com/"
languageCode = "en-us"
title = "Bárbara Gomes Romeira"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 5

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Bárbara Gomes Romeira"
  description = "AI Product Leader. PhD in Industrial Engineering. Building products where AI meets the factory floor."
  keywords = ["AI", "Product Management", "Lean", "Continuous Improvement", "Industrial Engineering"]
  author = "Bárbara Gomes Romeira"
  DateFormat = "January 2, 2006"
  defaultTheme = "auto"
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  [params.assets]
    disableHLJS = true

  # Header logo: short display name + animated fries icon next to it.
  # site.Title stays full ("Bárbara Gomes Romeira") for browser tabs, RSS,
  # schema.org, SEO — only the visible header text/icon change.
  [params.label]
    text = "Bárbara Romeira"
    icon = "img/icons/fries2.gif"
    iconHeight = 32

  # Home page profile mode (hero-style landing)
  [params.profileMode]
    enabled = true
    title = "Bárbara Gomes Romeira"
    subtitle = "AI Product Leader · PhD in Industrial Engineering · 7+ years building products and leading lean transformations across Europe and North America."
    imageUrl = "img/profile/barbara.jpg"
    imageWidth = 280
    imageHeight = 280
    imageTitle = "Bárbara Gomes Romeira"

  # Social icons in the header — add Substack here once you have the URL
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/barbararomeira"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/dr-b%C3%A1rbara-gomes-romeira"
  # [[params.socialIcons]]
  #   name = "substack"
  #   url = "https://YOURHANDLE.substack.com"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    limit = 10
    keys = ["title", "permalink", "summary", "content"]

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  identifier = "experience"
  name = "Experience"
  url = "/experience/"
  weight = 15

[[menu.main]]
  identifier = "blogs"
  name = "Blogs"
  url = "/blogs/"
  weight = 20

[[menu.main]]
  identifier = "projects"
  name = "Projects"
  url = "/projects/"
  weight = 30

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 35

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  style = "monokai"
